# Embedded H2 Database configuration
spring.datasource.url=jdbc:h2:mem:inventorydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Tell Hibernate (JPA Implementation) to create our tables automatically based on our @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Enable H2 web console so we can view the database in our browser later (optional but helpful)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
